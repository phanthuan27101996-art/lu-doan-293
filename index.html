
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#b91c1c" />
    <title>Sổ tay học tập</title>
    <!-- Open Graph (share preview) – logo cục bộ -->
    <meta property="og:title" content="Sổ tay học tập" />
    <meta property="og:description" content="Sổ tay học tập — tra cứu tài liệu và học tập nội bộ" />
    <meta property="og:image" content="/app-icon.jpg" />
    <!-- Favicon & PWA / Apple touch -->
    <link rel="icon" type="image/jpeg" href="/app-icon.jpg" />
    <link rel="apple-touch-icon" href="/app-icon.jpg" />
    
    <!-- Default font (Inter) + Noto Sans fallback – other fonts lazy-loaded on demand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Áp dụng chế độ tối ngay khi tải (trước React) để tránh nháy -->
    <script>
      (function() {
        try {
          var raw = localStorage.getItem('ui-storage');
          if (!raw) return;
          var data = JSON.parse(raw);
          var state = data && data.state;
          if (!state) return;
          var el = document.documentElement;
          // Dark mode
          var scheme = state.colorScheme;
          var isDark = scheme === 'dark' || (scheme === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            el.classList.add('dark');
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', '#0f172a');
          } else {
            el.classList.remove('dark');
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', '#ffffff');
          }
          // Primary color – prevent flash of default color
          var colorMap = {
            blue:'221.2 83.2% 53.3%', violet:'262.1 83.3% 57.8%',
            emerald:'142.1 76.2% 36.3%', rose:'346.8 77.2% 49.8%',
            amber:'37.7 92.1% 50.2%', orange:'24.6 95% 53.1%',
            cyan:'188.7 94.5% 42.7%', slate:'215.4 16.3% 46.9%'
          };
          var pc = state.primaryColor;
          if (pc && colorMap[pc]) {
            var v = colorMap[pc];
            el.style.setProperty('--primary', v);
            el.style.setProperty('--ring', v);
            el.style.setProperty('--secondary-foreground', v);
            el.style.setProperty('--accent-foreground', v);
            el.style.setProperty('--color-primary', 'hsl(' + v + ')');
            el.style.setProperty('--color-ring', 'hsl(' + v + ' / 0.5)');
          }
        } catch (e) {}
      })();
    </script>
